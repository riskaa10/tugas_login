<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login ulang✮</title>
    <style>
* .error-message {
    color: red;
    font-size: 0.9rem;
    margin-top: -10px;
    margin-bottom: 15px;
    font-weight: bold;
    text-align: center;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-image: url(ganteng.jpg);
}

/* kotak login */
.login-container {
    background: white;
    padding: 2.5rem;
    border-radius: 24px;
    box-shadow: 0 10px 25px rgb(14, 27, 85);
    width: 230px;
    text-align: center;
    animation: fadeln 1s ease;
}

.login-container h2 {
    margin-bottom: 1.5rem;
    color:  rgb(142, 117, 255);
}

.inputform {
    position: relative;
    margin-bottom: 1.5rem;
}

.inputform input {
    width: 100%;
    padding: 10px 10px;
    font-size: 1rem;
    border: 1px solid #444;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.3s;
}

button {
    width: 100%;
    padding: 10px;
    background: rgb(52, 45, 117);
    border: none;
    color: white;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: rgb(102, 99, 255);
}


    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form id="loginform">
            <div class="inputform">
                <input type="text" id="username" placeholder="username" required>
            </div>
            <div class="inputform">
                <input type="password" id="password" placeholder="password" required>
            </div>
             <button type="submit">Masukk</button>
             <br><br>
             <p class="error-message">Incorrect password, please log in again!</p>

        </form>
    </div>
    <script>
        const form = document.getElementById('loginform');

console.log(form);

form.addEventListener("submit", function(e ) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
     const password = document.getElementById("password").value.trim();

     if (username === "riska" && password === "24oktober") {
        localStorage.setItem("isLoggedIn", "true");
        window.location.href = "dashboard.html";
     } else {
        window.location.href = "login ulang.html"
     }
 });

    </script>


</body>
</html>
